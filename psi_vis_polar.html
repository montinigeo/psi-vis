<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSI VIS — Diagramma Polare</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1117">
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700&display=swap');
:root{--bg:#0d1117;--panel:#161b22;--border:#1e2d42;--accent:#4a9eff;--text:#cdd6e8;--dim:#4a5a72;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:18px 12px 36px;}
h1{font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:.18em;color:var(--accent);
  text-transform:uppercase;margin-bottom:3px;text-align:center;}
.sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);
  letter-spacing:.08em;margin-bottom:18px;text-align:center;}
.controls{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:16px;
  background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:12px 18px;max-width:680px;width:100%;}
.cg{display:flex;flex-direction:column;gap:3px;}
.cg label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:.12em;
  color:var(--dim);text-transform:uppercase;}
.cg select,.cg input{background:var(--bg);border:1px solid var(--border);color:var(--text);
  font-family:'Share Tech Mono',monospace;font-size:12px;padding:5px 8px;border-radius:4px;
  min-width:180px;}
.cg select:focus,.cg input:focus{outline:none;border-color:var(--accent);}
.orbit-toggle{display:flex;gap:0;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.orbit-toggle button{flex:1;padding:6px 18px;background:var(--bg);border:none;
  color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:11px;
  letter-spacing:.1em;cursor:pointer;transition:background .15s,color .15s;}
.orbit-toggle button.active{background:var(--accent);color:#0d1117;font-weight:bold;}
.polar-wrap{position:relative;width:min(560px,96vw);height:min(560px,96vw);}
.polar-wrap canvas{display:block;width:100%;height:100%;position:absolute;top:0;left:0;}
.polar-wrap canvas:first-child{position:relative;}
.cb-wrap{display:flex;align-items:center;gap:8px;margin-top:8px;width:min(420px,90vw);}
.cb-wrap canvas{height:12px;flex:1;border-radius:3px;}
.cb-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--dim);}
.htip{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);
  text-align:center;min-height:14px;margin-top:8px;}
.calc-panel{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:14px;
  background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:12px 18px;max-width:680px;width:100%;}
.stitle{width:100%;font-family:'Share Tech Mono',monospace;font-size:9px;
  letter-spacing:.16em;color:var(--accent);text-transform:uppercase;}
.ritem{display:flex;flex-direction:column;gap:3px;}
.ritem .lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--dim);
  letter-spacing:.1em;text-transform:uppercase;}
.rval{font-family:'Share Tech Mono',monospace;font-size:22px;font-weight:bold;line-height:1;}
.rswatch{width:40px;height:24px;border-radius:3px;border:1px solid var(--border);align-self:flex-end;}

.custom-panel{display:none;flex-wrap:wrap;gap:10px;justify-content:center;
  background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:10px 16px;max-width:680px;width:100%;margin-bottom:12px;}
.custom-panel.visible{display:flex;}
.custom-panel .sect{font-family:'Share Tech Mono',monospace;font-size:9px;
  letter-spacing:.14em;color:var(--accent);text-transform:uppercase;
  width:100%;margin-bottom:2px;}

</style>
</head>
<body>
<h1>PSI VIS — Diagramma Polare pc_mov</h1>
<p class="sub">raggi = slope (0–90°) · cerchio esterno = aspect (0–360°) · colore = pc_mov</p>
<div class="controls">
  <div class="cg"><label>Satellite</label><select id="sat"></select></div>
  <div class="cg"><label>Orbita</label>
    <div class="orbit-toggle">
      <button id="btn-asc" class="active" onclick="setOrbit('ASC')">ASC</button>
      <button id="btn-desc"               onclick="setOrbit('DESC')">DESC</button>
    </div>
  </div>
  <div class="cg"><label>Risoluzione</label>
    <select id="res"><option value="1">Alta (1°)</option>
      <option value="2" selected>Media (2°)</option><option value="5">Bassa (5°)</option></select>
  </div>
</div>
<div class="custom-panel" id="custom-panel"><div class="sect">▸ Parametri personalizzati</div><div class="cg"><label>Azimut ASC (°)</label><input type="number" id="c-az-a" value="-11" step="0.5" min="-180" max="360" style="background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:12px;padding:5px 8px;border-radius:4px;width:100%" oninput="onCustomChange()"></div><div class="cg"><label>Off-nadir ASC (°)</label><input type="number" id="c-on-a" value="42" step="0.5" min="1" max="89" style="background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:12px;padding:5px 8px;border-radius:4px;width:100%" oninput="onCustomChange()"></div><div class="cg"><label>Azimut DESC (°)</label><input type="number" id="c-az-d" value="191" step="0.5" min="-180" max="360" style="background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:12px;padding:5px 8px;border-radius:4px;width:100%" oninput="onCustomChange()"></div><div class="cg"><label>Off-nadir DESC (°)</label><input type="number" id="c-on-d" value="38" step="0.5" min="1" max="89" style="background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:12px;padding:5px 8px;border-radius:4px;width:100%" oninput="onCustomChange()"></div></div>
<div id="params" style="font-family:'Share Tech Mono',monospace;font-size:11px;
  color:#4a9eff;letter-spacing:.1em;margin-bottom:10px;text-align:center;min-height:16px;">—</div>
<div class="polar-wrap">
  <canvas id="cv" width="560" height="560"></canvas>
  <canvas id="mk" width="560" height="560" style="pointer-events:none;position:absolute;top:0;left:0;width:100%;height:100%"></canvas>
  <canvas id="ov" width="560" height="560" style="cursor:crosshair"></canvas>
</div>
<div class="cb-wrap"><span class="cb-lbl">0%</span><canvas id="cb" height="12"></canvas><span class="cb-lbl">100%</span></div>
<div class="htip" id="tip">— passa il cursore sul diagramma —</div>
<div class="calc-panel">
  <div class="stitle">▸ Calcolo puntuale</div>
  <div class="cg"><label>Aspect (°)</label>
    <input type="number" id="ca" value="80" min="0" max="360" step="1" style="min-width:90px" oninput="calc()"></div>
  <div class="cg"><label>Slope (°)</label>
    <input type="number" id="cs" value="40" min="0" max="90" step="1" style="min-width:90px" oninput="calc()"></div>
  <div class="ritem"><div class="lbl">pc_mov</div><div class="rval" id="rv" style="color:#4a9eff">—</div></div>
</div>
<script>
// ── Presets (da InSAR Suite dialog.py) ───────────────────────────────────────
const SATS = {
  's1egms':  { label:'Sentinel-1 (EGMS)',     asc:{az:-11.0,on:42.0}, desc:{az:191.0,on:38.0} },
  's1gen':   { label:'Sentinel-1 (generico)', asc:{az:-12.0,on:33.0}, desc:{az:192.0,on:33.0} },
  'ers':     { label:'ERS / Envisat',         asc:{az:-13.0,on:23.0}, desc:{az:193.0,on:23.0} },
  'alos':    { label:'ALOS / ALOS-2',         asc:{az:-10.0,on:34.0}, desc:{az:190.0,on:34.0} },
  'rs2':     { label:'RADARSAT-2',            asc:{az:-10.0,on:35.0}, desc:{az:190.0,on:35.0} },
  'csk':     { label:'COSMO-SkyMed',          asc:{az:-15.0,on:30.0}, desc:{az:195.0,on:30.0} },
  'tsx':     { label:'TerraSAR-X / TanDEM-X', asc:{az:-10.0,on:35.0}, desc:{az:190.0,on:35.0} },
  'custom':  { label:'Personalizzato',         asc:{az:-11.0,on:42.0}, desc:{az:191.0,on:38.0} },
};

// ── Formula pc_mov ────────────────────────────────────────────────────────────
function pcMov(slp, asp, az, on) {
  if (slp <= 3) return Math.cos(on*Math.PI/180)*100;
  const phi=az*Math.PI/180, theta=on*Math.PI/180;
  const a=slp*Math.PI/180, b=asp*Math.PI/180;
  return Math.abs(Math.cos(a)*Math.sin(theta)*Math.sin(b-phi)+Math.sin(a)*Math.cos(theta))*100;
}

// ── Scala colore pc_mov ───────────────────────────────────────────────────────
const PC_STOPS=[[0,[122,16,16]],[25,[196,74,24]],[50,[200,160,16]],[75,[58,170,56]],[100,[16,128,80]]];
function pcColor(v) {
  v=Math.max(0,Math.min(100,v));
  for(let i=0;i<PC_STOPS.length-1;i++){
    const[v0,c0]=PC_STOPS[i],[v1,c1]=PC_STOPS[i+1];
    if(v<=v1){const t=(v-v0)/(v1-v0);return c0.map((c,j)=>Math.round(c+t*(c1[j]-c)));}
  }
  return PC_STOPS[PC_STOPS.length-1][1];
}

// ── Classe combinata ──────────────────────────────────────────────────────────
function classRgb(a,d){
  const ha=a>=50,hd=d>=50;
  if(ha&&hd)  return[34,197,94];
  if(!ha&&!hd)return[239,68,68];
  if(ha&&!hd) return[59,130,246];
  return[249,115,22];
}
function classCSS(a,d){const[r,g,b]=classRgb(a,d);return`rgb(${r},${g},${b})`;}

// ── Griglia polare ────────────────────────────────────────────────────────────
function drawGrid(ctx,cx,cy,R){
  ctx.save();
  for(let s=10;s<=90;s+=10){
    const r=(s/90)*R;
    ctx.beginPath();ctx.arc(cx,cy,r,0,2*Math.PI);
    ctx.strokeStyle=s===90?'rgba(0,0,0,1)':'rgba(0,0,0,0.6)';
    ctx.lineWidth=s===90?2:0.7;ctx.stroke();
  }
  ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=0.7;
  for(let a=0;a<360;a+=10){
    const rad=(a-90)*Math.PI/180;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.lineTo(cx+R*Math.cos(rad),cy+R*Math.sin(rad));ctx.stroke();
  }
  ctx.fillStyle='rgba(0,0,0,0.8)';ctx.font='8px "Share Tech Mono"';ctx.textAlign='left';
  for(let s=10;s<90;s+=10){const r=(s/90)*R;ctx.fillText(s+'°',cx+3,cy-r+9);}
  const dirs=['N','NE','E','SE','S','SW','W','NW'];
  ctx.fillStyle='rgba(210,220,235,0.95)';ctx.font='bold 10px "Barlow Condensed"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(let i=0;i<8;i++){
    const rad=(i*45-90)*Math.PI/180;
    ctx.fillText(dirs[i],cx+(R+16)*Math.cos(rad),cy+(R+16)*Math.sin(rad));
  }
  ctx.restore();
}

// ── Freccia AZ + LOS ──────────────────────────────────────────────────────────
function drawAzLOS(ctx,cx,cy,R,az,on,color,label){
  const azRad=(az-90)*Math.PI/180;
  const tipX=cx+R*Math.cos(azRad),tipY=cy+R*Math.sin(azRad);
  const tailX=cx-R*Math.cos(azRad),tailY=cy-R*Math.sin(azRad);
  const alen=8;
  ctx.save();
  ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=1.8;
  ctx.beginPath();ctx.moveTo(tailX,tailY);ctx.lineTo(tipX,tipY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(tipX,tipY);
  ctx.lineTo(tipX-alen*Math.cos(azRad-0.38),tipY-alen*Math.sin(azRad-0.38));
  ctx.lineTo(tipX-alen*Math.cos(azRad+0.38),tipY-alen*Math.sin(azRad+0.38));
  ctx.closePath();ctx.fill();
  if(label){
    ctx.font='9px "Share Tech Mono"';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(label,cx+(R+20)*Math.cos(azRad),cy+(R+20)*Math.sin(azRad));
  }
  const lookRad=(az+90)*Math.PI/180 - Math.PI/2;  // az+90 → look dir, -90 per conv canvas Nord=su
  const losLen=R*0.46;
  const lx=cx+losLen*Math.cos(lookRad),ly=cy+losLen*Math.sin(lookRad);
  ctx.lineWidth=1.6;
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(lx,ly);ctx.stroke();
  ctx.beginPath();ctx.moveTo(lx,ly);
  ctx.lineTo(lx-alen*Math.cos(lookRad-0.38),ly-alen*Math.sin(lookRad-0.38));
  ctx.lineTo(lx-alen*Math.cos(lookRad+0.38),ly-alen*Math.sin(lookRad+0.38));
  ctx.closePath();ctx.fill();
  ctx.restore();
}

// ── Disegna celle polari pc_mov ───────────────────────────────────────────────
function drawCellsPcMov(ctx,cx,cy,R,az,on,res){
  const nA=Math.round(360/res),nS=Math.round(90/res);
  for(let ai=0;ai<nA;ai++){
    const asp0=ai*res,asp1=asp0+res,aspM=(asp0+asp1)/2;
    const a0=(asp0-90)*Math.PI/180,a1=(asp1-90)*Math.PI/180;
    for(let si=0;si<nS;si++){
      const slp0=si*res,slp1=slp0+res,slpM=(slp0+slp1)/2;
      const r0=(slp0/90)*R,r1=(slp1/90)*R;
      const[r,g,b]=pcColor(pcMov(slpM,aspM,az,on));
      ctx.beginPath();ctx.arc(cx,cy,r1,a0,a1);ctx.arc(cx,cy,r0,a1,a0,true);
      ctx.closePath();ctx.fillStyle=`rgba(${r},${g},${b},0.93)`;ctx.fill();
    }
  }
}

// ── Disegna celle polari combinato ────────────────────────────────────────────
function drawCellsBoth(ctx,cx,cy,R,azA,onA,azD,onD,res){
  const nA=Math.round(360/res),nS=Math.round(90/res);
  for(let ai=0;ai<nA;ai++){
    const asp0=ai*res,asp1=asp0+res,aspM=(asp0+asp1)/2;
    const a0=(asp0-90)*Math.PI/180,a1=(asp1-90)*Math.PI/180;
    for(let si=0;si<nS;si++){
      const slp0=si*res,slp1=slp0+res,slpM=(slp0+slp1)/2;
      const r0=(slp0/90)*R,r1=(slp1/90)*R;
      const pcA=pcMov(slpM,aspM,azA,onA),pcD=pcMov(slpM,aspM,azD,onD);
      const[r,g,b]=classRgb(pcA,pcD);
      ctx.beginPath();ctx.arc(cx,cy,r1,a0,a1);ctx.arc(cx,cy,r0,a1,a0,true);
      ctx.closePath();ctx.fillStyle=`rgba(${r},${g},${b},0.93)`;ctx.fill();
    }
  }
}

// ── Sfondo cerchio ────────────────────────────────────────────────────────────
function drawBg(ctx,cx,cy,R,bg){
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,R,0,2*Math.PI);
  ctx.fillStyle=bg;ctx.fill();ctx.restore();
}

// ── Crosshair overlay ─────────────────────────────────────────────────────────
function drawCrosshair(ov,mx,my,R){
  const ctx=ov.getContext('2d');ctx.clearRect(0,0,ov.width,ov.height);
  const cx=ov.width/2,cy=ov.height/2,ox=cx+mx,oy=cy+my;
  ctx.save();ctx.strokeStyle='rgba(255,255,255,0.65)';ctx.lineWidth=1;
  ctx.setLineDash([2,3]);
  ctx.beginPath();ctx.moveTo(ox,cy-R);ctx.lineTo(ox,cy+R);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-R,oy);ctx.lineTo(cx+R,oy);ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();ctx.arc(ox,oy,5,0,2*Math.PI);
  ctx.strokeStyle='rgba(255,255,255,0.85)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.restore();
}

// ── Marker puntuale ───────────────────────────────────────────────────────────
function drawMarker(ov,slp,asp,R){
  const ctx=ov.getContext('2d');ctx.clearRect(0,0,ov.width,ov.height);
  const cx=ov.width/2,cy=ov.height/2;
  const r=(slp/90)*R,rad=(asp-90)*Math.PI/180;
  const mx=cx+r*Math.cos(rad),my=cy+r*Math.sin(rad);
  ctx.save();ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=1.2;
  ctx.setLineDash([2,3]);
  ctx.beginPath();ctx.moveTo(mx,cy-R);ctx.lineTo(mx,cy+R);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-R,my);ctx.lineTo(cx+R,my);ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();ctx.arc(mx,my,6,0,2*Math.PI);
  ctx.strokeStyle='white';ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.arc(mx,my,2,0,2*Math.PI);
  ctx.fillStyle='white';ctx.fill();ctx.restore();
}

// ── Colorbar ──────────────────────────────────────────────────────────────────
function drawColorbar(cb){
  if(!cb)return;const ctx=cb.getContext('2d');const W=cb.width,H=cb.height;
  for(let x=0;x<W;x++){const[r,g,b]=pcColor((x/W)*100);
    ctx.fillStyle=`rgb(${r},${g},${b})`;ctx.fillRect(x,0,1,H);}
}

// ── Coords hover ──────────────────────────────────────────────────────────────
function hoverCoords(e,ov,R){
  const rect=ov.getBoundingClientRect();
  const scX=ov.width/rect.width,scY=ov.height/rect.height;
  const mx=(e.clientX-rect.left)*scX-ov.width/2;
  const my=(e.clientY-rect.top)*scY-ov.height/2;
  const dist=Math.sqrt(mx*mx+my*my);
  if(dist>R||dist<1)return null;
  const asp=((Math.atan2(mx,-my)*180/Math.PI)+360)%360;
  const slp=(dist/R)*90;
  return{asp,slp,mx,my};
}

// ── Opzioni select satellite ──────────────────────────────────────────────────

function getSat(){
  const key=document.getElementById('sat').value;
  if(key!=='custom')return SATS[key];
  return{label:'Personalizzato',
    asc:{az:parseFloat(document.getElementById('c-az-a').value)||0,
         on:parseFloat(document.getElementById('c-on-a').value)||39},
    desc:{az:parseFloat(document.getElementById('c-az-d').value)||0,
          on:parseFloat(document.getElementById('c-on-d').value)||39}};
}
function onSatChange(){
  const isC=document.getElementById('sat').value==='custom';
  document.getElementById('custom-panel').classList.toggle('visible',isC);
  draw();
}
function onCustomChange(){ if(document.getElementById('sat').value==='custom')draw(); }

function buildSatOptions(selId){
  const sel=document.getElementById(selId);
  Object.entries(SATS).forEach(([k,v])=>{
    const o=document.createElement('option');o.value=k;o.textContent=v.label;sel.appendChild(o);
  });
}

let currentOrbit='ASC';
const R=560/2-28;
function setOrbit(o){
  currentOrbit=o;
  document.getElementById('btn-asc').classList.toggle('active',o==='ASC');
  document.getElementById('btn-desc').classList.toggle('active',o==='DESC');
  draw();
}
function updateParams(){
  const sat=getSat();
  const p=currentOrbit==='ASC'?sat.asc:sat.desc;
  const orb=currentOrbit==='ASC'?'ASC':'DESC';
  document.getElementById('params').textContent=
    orb+'  ·  az '+p.az.toFixed(1)+'°  ·  on '+p.on.toFixed(1)+'°';
}
function clearMarker(){
  const mk=document.getElementById('mk');
  if(mk)mk.getContext('2d').clearRect(0,0,mk.width,mk.height);
}
function draw(){
  const satKey=document.getElementById('sat').value;
  const res=parseInt(document.getElementById('res').value)||2;
  const sat=getSat();
  const p=currentOrbit==='ASC'?sat.asc:sat.desc;
  updateParams();
  const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  const cx=cv.width/2,cy=cv.height/2;
  ctx.clearRect(0,0,cv.width,cv.height);
  drawBg(ctx,cx,cy,R,'#0d1117');
  drawCellsPcMov(ctx,cx,cy,R,p.az,p.on,res);
  drawGrid(ctx,cx,cy,R);
  drawAzLOS(ctx,cx,cy,R,p.az,p.on,'rgba(255,0,220,0.95)');
  drawColorbar(document.getElementById('cb'));
  calc();
}
function calc(){
  const asp=parseFloat(document.getElementById('ca').value);
  const slp=parseFloat(document.getElementById('cs').value);
  if(isNaN(asp)||isNaN(slp))return;
  const sat=getSat();
  const p=currentOrbit==='ASC'?sat.asc:sat.desc;
  const v=pcMov(slp,asp,p.az,p.on);
  const[r,g,b]=pcColor(v);
  document.getElementById('rv').textContent=v.toFixed(1)+'%';
  document.getElementById('rv').style.color=`rgb(${r},${g},${b})`;
  drawMarker(document.getElementById('mk'),slp,asp,R);
}
const ov=document.getElementById('ov');
ov.addEventListener('mousemove',e=>{
  const c=hoverCoords(e,ov,R);
  if(!c){ov.getContext('2d').clearRect(0,0,ov.width,ov.height);
    document.getElementById('tip').textContent='— passa il cursore sul diagramma —';return;}
  const sat=getSat();
  const p=currentOrbit==='ASC'?sat.asc:sat.desc;
  const v=pcMov(c.slp,c.asp,p.az,p.on);
  const[r,g,b]=pcColor(v);
  drawCrosshair(ov,c.mx,c.my,R);
  document.getElementById('tip').innerHTML=
    `aspect <b style="color:#4a9eff">${c.asp.toFixed(1)}°</b> &nbsp;`+
    `slope <b style="color:#4a9eff">${c.slp.toFixed(1)}°</b> &nbsp;`+
    `pc_mov <b style="color:rgb(${r},${g},${b})">${v.toFixed(1)}%</b>`;
});
ov.addEventListener('mouseleave',()=>{
  ov.getContext('2d').clearRect(0,0,ov.width,ov.height);
  document.getElementById('tip').textContent='— passa il cursore sul diagramma —';
});
document.getElementById('sat').addEventListener('change',onSatChange);
